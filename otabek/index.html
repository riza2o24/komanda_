<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="otabek.css">
</head>
<body>
    <div class="container">
        <!-- UpItems -->
        <div class="UpItems container">
            <div class="prompt">
                <p class="prompt__p"><img src="icon/MAIL (1).png" alt="icon">bestxtore@gmail.com</p>
                <p class="prompt__p"><img src="icon/PHONE CALL.png" alt="icon">0129523523</p>
            </div>

            <p class="UpItems__p">Up to <b>50%</b> Off All Items <img src="icon/01 align center.png" alt="icon"></p>

            <div class="UpItems__us"> 
                <p class="UpItems__us--p"><img src="icon/TRUCK.png" alt="icon">Track Your Order</p>

                <img src="icon/LINE.png" alt="LINE">

                <img src="icon/BUTTON (4).png" alt="us">

                    <div class="flex">
                        <img src="icon/LINE.png" alt="LINE">

                    </div>
                </div>

                <img src="icon/SEARCH.png" alt="icon">
            </div>

            <div>
                <img src="icon/ICON (3).png" alt="icon">
            </div>
        </header>


        <!-- header2 -->
        <header class="header2">

            <div class="flex2">

                <div class="header2__div">
                    <p class="header2__div--p">All Categories</p>
                     <img src="icon/ANGLE SMALL.png" alt="icon">
                </div>

                <nav>
                <ul class="header2__nav">
                    <li>
                        <a class="header2__nav--link we" href="#">Product</a>
                    </li>

                    <li>
                        <a class="header2__nav--link" href="#">Flash Sale</a>
                    </li>

                    <li>
                        <a class="header2__nav--link" href="#">Best Sellers</a>
                    </li>


                    <li>
                        <a class="header2__nav--link" href="#">Specials Offers</a>
                    </li>

                    <li>
                        <a class="header2__nav--link" href="#">Blog</a>
                    </li>

                    <li>
                        <a class="header2__nav--link" href="#">About Us</a>
                    </li>

                    <li>
                        <a class="header2__nav--link" href="#">Contact Us</a>
                    </li>
                </ul>
                </nav>
            </div>

            <div class="flex3">
                <img src="icon/MAP MARKER.png" alt="MARKER">

                <p class="flex3__p">Stores Near You <span> 20Stores Nationwide</span></p>
            </div>
        </header>

    </div>
    <script src="otabek.js"></script>
